name: Build

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.0.0
    
    - name: Install Dependencies
      run: pnpm install
    
    - name: Build Frontend
      run: pnpm run build
